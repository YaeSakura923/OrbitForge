<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="description" content="OrbitForge Satellite Tracker — Real-time satellite orbit visualization and tracking dashboard" />
    <meta name="theme-color" content="#0a0e17" />
    <title>OrbitForge — Satellite Tracker</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><defs><linearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'><stop offset='0%25' stop-color='%234fc3f7'/><stop offset='100%25' stop-color='%237c4dff'/></linearGradient></defs><circle cx='16' cy='16' r='14' fill='none' stroke='url(%23g)' stroke-width='1.5'/><path d='M16 6v10l8 4' stroke='url(%23g)' stroke-width='2' fill='none' stroke-linecap='round'/><circle cx='16' cy='16' r='3' fill='url(%23g)' opacity='0.6'/></svg>" />
    <style>
      html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #0a0e17; color: #e0e0e0; -webkit-font-smoothing: antialiased; }
      *, *::before, *::after { box-sizing: border-box; }
      #splash { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0a0e17; z-index: 99999; transition: opacity 0.5s ease, visibility 0.5s ease; }
      #splash.hidden { opacity: 0; visibility: hidden; }
      #splash svg { width: 56px; height: 56px; margin-bottom: 20px; animation: sp 1.5s ease-in-out infinite; }
      #splash h1 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg, #4fc3f7, #7c4dff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: 1px; margin-bottom: 6px; }
      #splash p { font-size: 12px; color: #6a6a8e; letter-spacing: 2px; text-transform: uppercase; }
      #splash .sp { margin-top: 28px; width: 20px; height: 20px; border: 2px solid rgba(79,195,247,0.1); border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes sp { 0%,100%{transform:scale(1);opacity:0.8} 50%{transform:scale(1.08);opacity:1} }
      @keyframes spin { to{transform:rotate(360deg)} }
    </style>
  </head>
  <body>
    <div id="splash">
      <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <defs><linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#4fc3f7"/><stop offset="100%" stop-color="#7c4dff"/></linearGradient></defs>
        <circle cx="16" cy="16" r="13" stroke="url(#sg)" opacity="0.6"/>
        <path d="M16 3v8M16 21v8M3 16h8M21 16h8" stroke="url(#sg)" stroke-width="1" opacity="0.4"/>
        <circle cx="16" cy="16" r="4" fill="url(#sg)" opacity="0.3"/>
        <path d="M16 8l4 4-4 4-4-4 4-4z" fill="url(#sg)" opacity="0.5"/>
        <path d="M3 16c0 7.2 5.8 13 13 13" stroke="url(#sg)" stroke-width="1.5" opacity="0.5"/>
      </svg>
      <h1>OrbitForge</h1>
      <p>Satellite Tracker</p>
      <div class="sp"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
